<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu | Hilltop Coffee Shop</title>
    <meta
      name="description"
      content="Hilltop Coffee Shop menu boards: coffee bar, specialty + matcha lab, and the full pastry case. View them full screen or browse the details."
    />
    <link rel="icon" type="image/png" href="assets/logo-primary.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <meta property="og:title" content="Menu | Hilltop Coffee Shop" />
    <meta property="og:description" content="Coffee bar, matcha lab, specialty drinks, and the full pastry case at Hilltop Coffee Shop." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hilltopcoffeeshop.signalandform.net/menu.html" />
    <meta property="og:image" content="https://hilltopcoffeeshop.signalandform.net/assets/gallery/DSC00786.jpg" />
  </head>
  <body class="menu-page">
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="index.html">
          <img
            class="brand-logo"
            src="assets/logo-primary.png"
            alt="Hilltop Coffee Shop logo"
            width="56"
            height="56"
          />
          <div class="brand-stack">
            <span class="brand-text">Hilltop Coffee Shop</span>
            <span class="brand-tagline">Baked Goods &amp; Coffee</span>
          </div>
        </a>
        <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="index.html#home">Home</a>
          <a href="#coffee">Coffee</a>
          <a href="#matcha">Matcha</a>
          <a href="#pastries">Pastries</a>
          <a class="btn btn-nav" href="index.html#contact">Order Pickup</a>
          <a class="btn btn-secondary btn-nav" href="index.html#contact">Order Delivery</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="section hero menu-hero">
        <div class="container menu-hero-grid">
          <div>
            <p class="eyebrow">Hilltop Menu Boards</p>
            <h1 class="menu-page-title">Coffee, Matcha, Specialty Drinks &amp; Pastry</h1>
            <div class="menu-board-links">
              <a class="btn btn-neon" href="menu-board-coffee.html" target="_blank" rel="noopener">Coffee Board</a>
              <a class="btn btn-secondary" href="menu-board-matcha.html" target="_blank" rel="noopener">Matcha + Specialty Board</a>
              <a class="btn btn-secondary" href="menu-board-specialty.html" target="_blank" rel="noopener">Pastry Case Board</a>
            </div>
          </div>
          <div class="menu-hero-board">
            <img src="assets/menu/menu2.png" alt="Preview of the coffee, brilliance boost, and refresher menu board" loading="lazy" />
          </div>
        </div>
      </section>

      <section id="coffee" class="section menu-gallery">
        <div class="container">
          <div class="menu-board-grid menu-board-grid-images">
            <article class="menu-board-card menu-board-card-image">
              <a href="menu-board-coffee.html" target="_blank" rel="noopener">
                <img src="assets/menu/menu2.png" alt="Coffee, brilliance boost, and refresher menu board" loading="lazy" />
              </a>
            </article>

            <article id="matcha" class="menu-board-card menu-board-card-image">
              <a href="menu-board-matcha.html" target="_blank" rel="noopener">
                <img src="assets/menu/menu1.png" alt="Specialty drinks and matcha menu board" loading="lazy" />
              </a>
            </article>

            <article id="pastries" class="menu-board-card menu-board-card-image">
              <a href="menu-board-specialty.html" target="_blank" rel="noopener">
                <img src="assets/menu/pastry-case.png" alt="Pastry case menu board" loading="lazy" />
              </a>
            </article>
          </div>
        </div>
      </section>

    </main>

    <footer class="site-footer">
      <div class="container footer-wrap">
        <div class="footer-left">
          <img src="assets/logo-primary.png" alt="Hilltop Coffee Shop logo" class="footer-logo" />
          <p>
            © <span id="current-year"></span> Hilltop Coffee Shop · Northlake, TX
          </p>
        </div>
        <a class="back-to-top" href="index.html">
          Back to home
          <span class="back-to-top-arrow" aria-hidden="true">↑</span>
        </a>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
